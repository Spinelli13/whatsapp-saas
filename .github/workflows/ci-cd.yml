name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: whatsapp_saas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/whatsapp_saas_test
      JWT_SECRET: ci_jwt_secret_64chars_for_testing_only_do_not_use_in_prod
      JWT_REFRESH_SECRET: ci_refresh_secret_64chars_for_testing_only_different
      ENCRYPTION_KEY: ci_encrypt_key_32chars_padding_
      ENCRYPTION_KEY_HEX: 6369656e637279707420326b657933326368617273706164646e67

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Run tests
        run: npm test

      - name: Upload coverage (optional)
        if: always()
        continue-on-error: true
        run: npm run test:coverage

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t whatsapp-saas:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name smoke -e NODE_ENV=production -e PORT=3000 \
            -e JWT_SECRET=ci_smoke_test_secret \
            -e DATABASE_URL=postgresql://skip:skip@localhost/skip \
            -p 3000:3000 whatsapp-saas:${{ github.sha }} || true
          sleep 3
          docker stop smoke || true
